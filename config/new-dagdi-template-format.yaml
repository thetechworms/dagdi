# Dagdi Configuration Template - NEW FORMAT (Global Services)
#
# This template shows the NEW FORMAT where services are defined globally
# and referenced by servers.
# Use this format if:
# - You have many services repeated across environments
# - You want to follow DRY (Don't Repeat Yourself) principles
# - You need centralized service management
# - You want smaller, cleaner configuration files
#
# Structure: services (global) + products > environments > servers > service_names (references)

# GLOBAL SERVICES SECTION
# Define all services once here, then reference them by name in servers
services:
  - name: nginx
    type: docker
    # Service type: docker or systemd
    
    friendly_name: Web Server
    # Human-readable name for display
    
    config:
      # Service-specific configuration
      container_name: nginx
  
  - name: postgresql
    type: docker
    friendly_name: PostgreSQL Database
    port: 5432
    # Port number for the service
    
    config:
      container_name: postgresql
  
  - name: redis
    type: docker
    friendly_name: Redis Cache
    port: 6379
    config:
      container_name: redis
  
  - name: syslog
    type: systemd
    friendly_name: System Log
    config:
      log_path: /var/log/syslog
      log_command: tail -f /var/log/syslog
  
  - name: prometheus
    type: docker
    friendly_name: Prometheus Monitoring
    port: 9090
    api_endpoint: http://localhost:9090/api/v1
    config:
      container_name: prometheus
  
  - name: grafana
    type: docker
    friendly_name: Grafana Dashboard
    port: 3000
    config:
      container_name: grafana

# PRODUCTS SECTION
# Reference services by name using service_names field
products:
  - name: myapp
    # Product name - used to identify your application/infrastructure
    
    environments:
      - name: development
        # Environment name - e.g., dev, staging, prod
        
        servers:
          - name: web-server-1
            # Server name - unique identifier for this server
            
            type: ubuntu
            # OS type - ubuntu, centos, debian, etc.
            
            ips:
              - 10.0.1.10
              # IP address(es) for this server
              # Can be hostname or IP
            
            ssh:
              # SSH connection configuration
              username: ubuntu
              key_path: ~/.ssh/id_rsa
              # port: 2222              # Optional: SSH port (overrides global ssh_port)
              timeout: 30
              sudo: true
              # sudo_password: "prompt"    # Optional: prompt once instead of storing plain text
              # sudo_password: "password"  # Optional: literal sudo password
              # sudo_nopasswd: true        # Optional, for passwordless sudo
            
            service_names:
              # Services running on this server (REFERENCED by name)
              # These must match service names defined in the global services section
              - nginx
              - syslog
          
          - name: db-server-1
            type: ubuntu
            ips:
              - 10.0.1.20
            ssh:
              username: ubuntu
              key_path: ~/.ssh/id_rsa
              timeout: 30
              sudo: true
            
            service_names:
              # Different services for this server
              - postgresql
              - redis
              - syslog
          
          - name: monitoring-server-1
            type: ubuntu
            ips:
              - 10.0.1.30
            ssh:
              username: ubuntu
              key_path: ~/.ssh/id_rsa
              timeout: 30
              sudo: true
            
            service_names:
              # Monitoring services
              - prometheus
              - grafana
              - syslog
      
      - name: production
        # Another environment - services are referenced, not repeated!
        
        servers:
          - name: web-server-1
            type: ubuntu
            ips:
              - 10.0.2.10
            ssh:
              username: ubuntu
              key_path: ~/.ssh/id_rsa
              timeout: 30
              sudo: true
            
            service_names:
              # Same services as dev, but defined only once globally
              - nginx
              - syslog
          
          - name: db-server-1
            type: ubuntu
            ips:
              - 10.0.2.20
            ssh:
              username: ubuntu
              key_path: ~/.ssh/id_rsa
              timeout: 30
              sudo: true
            
            service_names:
              # Same services as dev, but defined only once globally
              - postgresql
              - redis
              - syslog
          
          - name: monitoring-server-1
            type: ubuntu
            ips:
              - 10.0.2.30
            ssh:
              username: ubuntu
              key_path: ~/.ssh/id_rsa
              timeout: 30
              sudo: true
            
            service_names:
              # Same services as dev, but defined only once globally
              - prometheus
              - grafana
              - syslog
      
      - name: staging
        # Third environment - still no service duplication!
        
        servers:
          - name: web-server-1
            type: ubuntu
            ips:
              - 10.0.3.10
            ssh:
              username: ubuntu
              key_path: ~/.ssh/id_rsa
              timeout: 30
              sudo: true
            
            service_names:
              - nginx
              - syslog
          
          - name: db-server-1
            type: ubuntu
            ips:
              - 10.0.3.20
            ssh:
              username: ubuntu
              key_path: ~/.ssh/id_rsa
              timeout: 30
              sudo: true
            
            service_names:
              - postgresql
              - redis
              - syslog

global_settings:
  # Global settings applied to all commands
  ssh_timeout: 30
  # SSH timeout in seconds

  ssh_port: 22
  # Default SSH port for all servers (override per server or per environment)

  on_partial_failure: prompt
  # Behavior on partial failure: continue, stop, or prompt

  live_status_table: true
  # Show live updating status table in monitoring commands

# BENEFITS OF THIS FORMAT:
# - Services defined once (6 services)
# - Referenced multiple times (9 references across 3 environments)
# - Total: 6 definitions + 9 references = 15 items
# - Old format would have: 6 services × 3 environments = 18 definitions
# - Reduction: 3 fewer definitions (17% smaller)
# - If you had 10 environments: 60 definitions vs 6 + 10 references = 16 items (73% smaller!)
#
# MAINTENANCE:
# - Update nginx config once, applies to all environments
# - Add new environment: just reference existing services
# - Add new service: define once, reference in all environments that need it
